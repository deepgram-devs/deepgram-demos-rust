name: dg-flux Release

on:
  push:
    tags:
      - "dg-flux-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing dg-flux tag to build and publish"
        required: true
        default: "dg-flux-v0.3.0"

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            archive: dg-flux-aarch64-apple-darwin.tar.gz
          - os: macos-15-intel
            target: x86_64-apple-darwin
            archive: dg-flux-x86_64-apple-darwin.tar.gz
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            archive: dg-flux-x86_64-unknown-linux-gnu.tar.gz
          - os: windows-2025
            target: x86_64-pc-windows-msvc
            archive: dg-flux-x86_64-pc-windows-msvc.zip

    steps:
      - name: Check out source
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

      - name: Install Linux audio build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes libasound2-dev pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --locked --release --package dg-flux --target ${{ matrix.target }}

      - name: Package Unix artifact
        if: runner.os != 'Windows'
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          ARCHIVE: ${{ matrix.archive }}
        run: |
          set -euo pipefail
          package_dir="package"
          mkdir "$package_dir"
          cp "target/$TARGET/release/dg-flux" "$package_dir/dg-flux"
          cp flux-turn-taking/README.md flux-turn-taking/CHANGELOG.md LICENSE.md "$package_dir/"
          chmod +x "$package_dir/dg-flux"
          tar -czf "$ARCHIVE" -C "$package_dir" .

      - name: Package Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          TARGET: ${{ matrix.target }}
          ARCHIVE: ${{ matrix.archive }}
        run: |
          $packageDir = "package"
          New-Item -ItemType Directory -Path $packageDir | Out-Null
          Copy-Item "target/$env:TARGET/release/dg-flux.exe" "$packageDir/dg-flux.exe"
          Copy-Item flux-turn-taking/README.md, flux-turn-taking/CHANGELOG.md, LICENSE.md $packageDir
          Compress-Archive -Path "$packageDir/*" -DestinationPath $env:ARCHIVE

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v5
        with:
          name: dg-flux-${{ matrix.target }}
          path: ${{ matrix.archive }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Check out source
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

      - name: Download packaged artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate checksums and release notes
        shell: bash
        run: |
          set -euo pipefail
          sha256sum release-assets/* > release-assets/SHA256SUMS.txt
          release_tag="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          version="${release_tag#dg-flux-v}"
          awk -v version="$version" '
            $0 ~ "^## \\[" version "\\]" { in_section = 1 }
            in_section && /^## / && $0 !~ "^## \\[" version "\\]" { exit }
            in_section { print }
          ' flux-turn-taking/CHANGELOG.md > release-notes.md
          test -s release-notes.md

      - name: Create GitHub release from artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" release-assets/* \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
            gh release edit "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --notes-file release-notes.md
          else
            gh release create "$RELEASE_TAG" release-assets/* \
              --repo "$GITHUB_REPOSITORY" \
              --verify-tag \
              --title "dg-flux v${RELEASE_TAG#dg-flux-v}" \
              --notes-file release-notes.md
          fi
