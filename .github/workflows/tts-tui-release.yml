name: TTS TUI Release

on:
  push:
    tags:
      - "tts-tui-v*"

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            archive: tts-tui-aarch64-apple-darwin.tar.gz
          - os: macos-13
            target: x86_64-apple-darwin
            archive: tts-tui-x86_64-apple-darwin.tar.gz
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            archive: tts-tui-x86_64-unknown-linux-gnu.tar.gz
          - os: windows-2025
            target: x86_64-pc-windows-msvc
            archive: tts-tui-x86_64-pc-windows-msvc.zip

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install Linux audio build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes libasound2-dev pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --locked --release --package tts-tui --target ${{ matrix.target }}

      - name: Package Unix artifact
        if: runner.os != 'Windows'
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          ARCHIVE: ${{ matrix.archive }}
        run: |
          set -euo pipefail
          package_dir="package"
          mkdir "$package_dir"
          cp "target/$TARGET/release/tts-tui" "$package_dir/tts-tui"
          cp tts-tui/README.md tts-tui/CHANGELOG.md tts-tui/TESTPLAN.md LICENSE.md "$package_dir/"
          chmod +x "$package_dir/tts-tui"
          tar -czf "$ARCHIVE" -C "$package_dir" .

      - name: Package Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          TARGET: ${{ matrix.target }}
          ARCHIVE: ${{ matrix.archive }}
        run: |
          $packageDir = "package"
          New-Item -ItemType Directory -Path $packageDir | Out-Null
          Copy-Item "target/$env:TARGET/release/tts-tui.exe" "$packageDir/tts-tui.exe"
          Copy-Item tts-tui/README.md, tts-tui/CHANGELOG.md, tts-tui/TESTPLAN.md, LICENSE.md $packageDir
          Compress-Archive -Path "$packageDir/*" -DestinationPath $env:ARCHIVE

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: tts-tui-${{ matrix.target }}
          path: ${{ matrix.archive }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate checksums and release notes
        shell: bash
        run: |
          set -euo pipefail
          sha256sum release-assets/* > release-assets/SHA256SUMS.txt
          version="${GITHUB_REF_NAME#tts-tui-v}"
          {
            echo "## tts-tui v$version"
            echo
            echo "See [tts-tui/CHANGELOG.md](https://github.com/${GITHUB_REPOSITORY}/blob/${GITHUB_SHA}/tts-tui/CHANGELOG.md) for the complete changelog."
            echo
            echo "### Checksums"
            echo
            echo '```text'
            cat release-assets/SHA256SUMS.txt
            echo '```'
          } > release-notes.md

      - name: Create GitHub release from artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" release-assets/* \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --title "tts-tui v${GITHUB_REF_NAME#tts-tui-v}" \
            --notes-file release-notes.md
